<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Work IQ — ask</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <style>
    :root {
      --paper: #FAF5E8;
      --paper-deep: #ECE4D2;
      --ink: #1B2A4A;
      --ink-soft: #3A4762;
      --ink-faint: #6E7892;
      --pen: #B83230;
      --ink-green: #2D7A4F;
      --border: rgba(27, 42, 74, 0.15);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.55;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.5rem 2rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
    }
    header .meta {
      margin-top: 0.25rem;
      font-size: 0.85rem;
      color: var(--ink-faint);
    }
    main {
      flex: 1;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }
    form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    input[type=text] {
      flex: 1;
      padding: 0.7rem 0.9rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--ink);
      font-family: inherit;
    }
    input[type=text]:focus {
      outline: 2px solid var(--ink-green);
      outline-offset: 0;
      border-color: var(--ink-green);
    }
    button {
      padding: 0.7rem 1.2rem;
      font-size: 1rem;
      font-weight: 600;
      background: var(--ink-green);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled {
      background: var(--ink-faint);
      cursor: not-allowed;
    }
    .examples {
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--ink-soft);
    }
    .examples a {
      color: var(--pen);
      text-decoration: none;
      border-bottom: 1px dashed var(--pen);
      margin-right: 0.6rem;
      cursor: pointer;
    }
    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }
    .card.pending .body {
      color: var(--ink-faint);
      font-style: italic;
    }
    .card.error {
      background: #fdf2f2;
      border-color: var(--pen);
      color: var(--pen);
    }
    .question-label {
      font-size: 0.8rem;
      color: var(--ink-faint);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .question-text {
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--ink);
      font-size: 1.05rem;
    }
    /* Rendered markdown body */
    .body h1, .body h2, .body h3 {
      margin: 1.2em 0 0.5em;
      color: var(--ink);
      line-height: 1.3;
    }
    .body h1 { font-size: 1.25rem; }
    .body h2 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
    .body h3 { font-size: 1rem; }
    .body p { margin: 0.75em 0; }
    .body ul, .body ol { margin: 0.5em 0; padding-left: 1.4rem; }
    .body li { margin: 0.3em 0; }
    .body strong { color: var(--ink); font-weight: 600; }
    .body em { color: var(--ink-soft); }
    .body code {
      background: var(--paper-deep);
      padding: 0.1em 0.35em;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: ui-monospace, 'SF Mono', Consolas, Menlo, monospace;
    }
    .body pre {
      background: var(--paper-deep);
      padding: 0.75rem 1rem;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.85rem;
    }
    .body pre code { background: none; padding: 0; }
    .body blockquote {
      margin: 0.75em 0;
      padding-left: 1rem;
      border-left: 3px solid var(--paper-deep);
      color: var(--ink-soft);
    }
    .body hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }
    .body table {
      border-collapse: collapse;
      margin: 0.75em 0;
      font-size: 0.9rem;
    }
    .body th, .body td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.65rem;
      text-align: left;
    }
    .body th { background: var(--paper-deep); font-weight: 600; }
    /* Links: keep clickable, don't let URLs blow the layout */
    .body a {
      color: var(--pen);
      text-decoration: underline;
      text-decoration-color: rgba(184, 50, 48, 0.4);
      text-underline-offset: 2px;
      overflow-wrap: anywhere;
    }
    .body a:hover { text-decoration-color: var(--pen); }
    /* The N-xxxxx citation markers Work IQ inlines -- styled as muted chips */
    .citation-marker {
      display: inline-block;
      background: var(--paper-deep);
      color: var(--ink-faint);
      font-size: 0.7em;
      padding: 0.05em 0.4em;
      border-radius: 999px;
      margin: 0 0.15em;
      vertical-align: super;
      cursor: help;
    }
    .footer-meta {
      margin-top: 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
      font-size: 0.75rem;
      color: var(--ink-faint);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--ink-faint);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--pen); }
  </style>
</head>
<body>
  <header>
    <h1>Work IQ — ask</h1>
    <div class="meta">Microsoft Work IQ via A2A REST · <span id="account">…</span></div>
  </header>

  <main>
    <form id="ask-form" autocomplete="off">
      <input type="text" id="question" placeholder="Ask anything across your mail, calendar, files, Teams…" required autofocus />
      <button type="submit" id="ask-btn">Ask</button>
    </form>

    <div class="examples">
      Try:
      <a data-q="What's on my calendar today?">today's calendar</a>
      <a data-q="Summarise everything about Project Adventure in the last 7 days.">project status</a>
      <a data-q="What commitments have I made that I haven't followed up on?">open commitments</a>
      <a data-q="Find emails from Mario about the auth spike.">find specific emails</a>
    </div>

    <div id="answers"></div>
  </main>

  <footer>
    Sample code — <a href="https://github.com/susanthgit/aguidetocloud-workiq-samples" target="_blank" rel="noopener">aguidetocloud-workiq-samples</a> · MIT licence
  </footer>

  <script>
    marked.use({ gfm: true, breaks: false });

    const form = document.getElementById('ask-form');
    const input = document.getElementById('question');
    const btn = document.getElementById('ask-btn');
    const answers = document.getElementById('answers');
    const accountSpan = document.getElementById('account');

    fetch('/api/health').then(r => r.json()).then(d => {
      accountSpan.textContent = d.account || '(unknown)';
    });

    document.querySelectorAll('.examples a').forEach(a => {
      a.addEventListener('click', () => {
        input.value = a.dataset.q;
        input.focus();
      });
    });

    // Work IQ inlines citation markers as Unicode square brackets
    function styleCitationMarkers(html) {
      return html.replace(/\u3010([^\u3011]+)\u3011/g, '<span class="citation-marker" title="source $1">$1</span>');
    }

    let conversationId = null;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      input.value = '';
      btn.disabled = true;

      const card = document.createElement('div');
      card.className = 'card pending';
      card.innerHTML = `
        <div class="question-label">You asked</div>
        <div class="question-text"></div>
        <div class="body">Asking Work IQ…</div>
      `;
      card.querySelector('.question-text').textContent = question;
      answers.prepend(card);

      try {
        const start = Date.now();
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, conversationId })
        });
        const elapsed = ((Date.now() - start) / 1000).toFixed(1);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        if (data.conversationId) conversationId = data.conversationId;

        card.classList.remove('pending');
        const body = card.querySelector('.body');

        const rawHtml = marked.parse(data.answer || '');
        const cleanHtml = DOMPurify.sanitize(rawHtml, { ADD_ATTR: ['target', 'rel'] });
        body.innerHTML = styleCitationMarkers(cleanHtml);

        body.querySelectorAll('a').forEach(a => {
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener noreferrer');
        });

        const meta = document.createElement('div');
        meta.className = 'footer-meta';
        meta.innerHTML = `
          <span>Answered in ${elapsed}s</span>
          <span>Account: ${data.account || '(unknown)'}</span>
          <span>Latency: ${data.latency_ms}ms</span>
        `;
        card.appendChild(meta);

      } catch (err) {
        card.classList.remove('pending');
        card.classList.add('error');
        card.querySelector('.body').textContent = 'Work IQ error: ' + err.message + ' (try again — transient failures happen)';
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
